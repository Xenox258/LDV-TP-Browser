<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ouverture TP Browser</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: #1f2937;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        color: #d1d5db;
        line-height: 1.5;
      }

      a,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      code {
        display: block;
        overflow-wrap: anywhere;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        padding: 12px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ouverture de TP Browser</h1>
      <p>Si l'application ne s'ouvre pas automatiquement, utilise le bouton ci-dessous.</p>
      <p><a id="open-link" href="#">Ouvrir TP Browser</a></p>
      <p>Tu peux aussi copier ce code dans l'application :</p>
      <code id="token">Code introuvable</code>
    </main>

    <script>
      const token = new URLSearchParams(window.location.search).get("token") || "";
      const appLink = token ? `tp-browser://reset?token=${encodeURIComponent(token)}` : "#";
      const openLink = document.getElementById("open-link");
      const tokenNode = document.getElementById("token");

      openLink.href = appLink;
      tokenNode.textContent = token || "Code introuvable";

      if (token) {
        window.setTimeout(() => {
          window.location.href = appLink;
        }, 300);
      }
    </script>
  </body>
</html>
